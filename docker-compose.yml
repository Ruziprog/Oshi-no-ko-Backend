services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app

    environment:
    - DEBUG=0 
    - SECRET_KEY=${SECRET_KEY}  
    - DATABASE_URL=postgresql://onk_user:${POSTGRES_PASSWORD}@db:5432/oshi_no_ko
    depends_on:
      - db
      - redis
    command: gunicorn oshi_no_ko.wsgi:application --bind 0.0.0.0:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=oshi_no_ko
      - POSTGRES_USER=onk_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  celery:
    build: .
    command: celery -A oshi_no_ko worker -l info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: