name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linters
      run: |
        pip install flake8 black
    
    - name: Run linters
      run: |
        flake8 .
        black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint  # ← Ждём, пока lint успешно завершится
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run migrations
      run: python manage.py migrate
      env:
        DJANGO_SETTINGS_MODULE: oshi_no_ko.settings
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
    
    - name: Run tests
      run: python manage.py test
      env:
        DJANGO_SETTINGS_MODULE: oshi_no_ko.settings
        SECRET_KEY: 'dummy-key-for-ci-only'
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
    
    - name: Collect static files
      run: python manage.py collectstatic --noinput
      env:
        DJANGO_SETTINGS_MODULE: oshi_no_ko.settings
  
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Trigger Render deploy
      run: |
        curl -X POST \
          https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
    
    - name: Wait for deployment
      run: |
        for i in {1..30}; do
          if curl -s -f https://your-app.onrender.com/health; then
            echo "Deployment successful!"
            exit 0
          fi
          echo "Waiting for deployment... ($i/30)"
          sleep 10
        done
        echo "Deployment failed or timed out"
        exit 1