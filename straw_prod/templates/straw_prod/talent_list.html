{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'straw_prod/css/style.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshi no Ko - Talent Management</title>

</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🌟 Oshi no Ko 🌟</h1>
            <p>Talent Management System - Strawberry Productions</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-type="idol">🎤 Idols</button>
            <button class="tab-btn" data-type="actor">🎭 Actors</button>
        </div>

        <!-- Content -->
        <div class="content-wrapper" id="contentWrapper">
            <div class="talents-grid" id="talentsGrid">
                <div class="loader">Loading...</div>
            </div>
        </div>

        <!-- Add Form -->
        <div class="add-form" id="addForm">
            <h2 id="formTitle">✨ Add New Idol ✨</h2>
            <form id="addTalentForm">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Age:</label>
                    <input type="number" id="age" required>
                </div>
                <div class="form-group">
                    <label>Gender:</label>
                    <select id="gender">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Debut Date:</label>
                    <input type="date" id="debutDate" required>
                </div>
                <div class="form-group">
                    <label>Agency:</label>
                    <input type="text" id="agency">
                </div>
                <div class="form-group">
                    <label>Biography:</label>
                    <textarea id="biography" rows="3"></textarea>
                </div>
                <button type="submit">🌟 Add 🌟</button>
            </form>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
<script src="{% static 'straw_prod/script.js' %}"></script>
</body>
</html>
