<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshi no Ko - Talent Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Tabs - красивый переключатель */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 12px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* Content wrapper для плавного перехода */
        .content-wrapper {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .content-wrapper.fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        /* Card Grid */
        .talents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Talent Card */
        .talent-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .talent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .talent-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
        }

        .talent-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .talent-info {
            padding: 20px;
        }

        .talent-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .talent-details {
            color: #666;
            margin-bottom: 15px;
        }

        .talent-details p {
            margin: 5px 0;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-right: 5px;
        }

        .badge-active {
            background: #4CAF50;
            color: white;
        }

        .badge-inactive {
            background: #f44336;
            color: white;
        }

        .badge-male {
            background: #2196F3;
            color: white;
        }

        .badge-female {
            background: #E91E63;
            color: white;
        }

        .badge-idol {
            background: #FF9800;
            color: white;
        }

        .badge-actor {
            background: #9C27B0;
            color: white;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8em;
            color: #999;
        }

        /* Add Form */
        .add-form {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 30px;
        }

        .add-form h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            float: right;
            font-size: 2em;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }

        /* Loading spinner */
        .loader {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🌟 Oshi no Ko 🌟</h1>
            <p>Talent Management System - Strawberry Productions</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-type="idol">🎤 Idols</button>
            <button class="tab-btn" data-type="actor">🎭 Actors</button>
        </div>

        <!-- Content -->
        <div class="content-wrapper" id="contentWrapper">
            <div class="talents-grid" id="talentsGrid">
                <div class="loader">Loading...</div>
            </div>
        </div>

        <!-- Add Form -->
        <div class="add-form" id="addForm">
            <h2 id="formTitle">✨ Add New Idol ✨</h2>
            <form id="addTalentForm">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Age:</label>
                    <input type="number" id="age" required>
                </div>
                <div class="form-group">
                    <label>Gender:</label>
                    <select id="gender">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Debut Date:</label>
                    <input type="date" id="debutDate" required>
                </div>
                <div class="form-group">
                    <label>Agency:</label>
                    <input type="text" id="agency">
                </div>
                <div class="form-group">
                    <label>Biography:</label>
                    <textarea id="biography" rows="3"></textarea>
                </div>
                <button type="submit">🌟 Add 🌟</button>
            </form>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

  <script>
    let currentType = 'idol';  // 'idol' или 'actor'
    let currentData = [];

    // ОДИН API URL (с фильтром)
    const API_URL = 'http://127.0.0.1:8000/api/talents/';

    // Tab switching with smooth transition
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const type = btn.dataset.type;
            if (type === currentType) return;

            // Update active tab
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Fade out
            const wrapper = document.getElementById('contentWrapper');
            wrapper.classList.add('fade-out');

            // Update form title
            const formTitle = document.getElementById('formTitle');
            formTitle.textContent = type === 'idol' ? '✨ Add New Idol ✨' : '🎭 Add New Actor ✨';
            
            // Wait for animation
            setTimeout(async () => {
                currentType = type;
                await loadData();
                wrapper.classList.remove('fade-out');
            }, 300);
        });
    });

    // Load data from API (с фильтром по типу)
    async function loadData() {
        const grid = document.getElementById('talentsGrid');
        grid.innerHTML = '<div class="loader">Loading...</div>';
        
        try {
            // Фильтруем по типу: ?type=idol или ?type=actor
            const response = await fetch(`${API_URL}?type=${currentType}`);
            currentData = await response.json();
            displayData(currentData);
        } catch (error) {
            console.error('Error loading data:', error);
            grid.innerHTML = '<div class="loader">Error loading data</div>';
        }
    }

    // Display data in grid
    function displayData(items) {
        const grid = document.getElementById('talentsGrid');
        grid.innerHTML = '';

        if (items.length === 0) {
            grid.innerHTML = '<div class="loader">No talents found. Add your first!</div>';
            return;
        }

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'talent-card';
            card.onclick = () => showDetails(item);
            
            // Тип берем из данных от API (item.talent_type)
            const typeBadge = item.talent_type === 'idol' ? 'badge-idol' : 'badge-actor';
            const typeLabel = item.talent_type === 'idol' ? 'Idol' : 'Actor';
            
            card.innerHTML = `
                <div class="talent-image">
                    ${item.profile_image ? 
                        `<img src="${item.profile_image}" alt="${item.name}">` : 
                        (item.gender === 'F' ? '👩‍🎤' : '👨‍🎤')
                    }
                </div>
                <div class="talent-info">
                    <div class="talent-name">${item.name}</div>
                    <div class="talent-details">
                        <p>Age: ${item.age} | Debut: ${item.debut_date}</p>
                        <p>Agency: ${item.agency || 'Independent'}</p>
                    </div>
                    <div>
                        <span class="badge ${typeBadge}">${typeLabel}</span>
                        <span class="badge ${item.status === 'A' ? 'badge-active' : 'badge-inactive'}">
                            ${item.status === 'A' ? 'Active' : 'Inactive'}
                        </span>
                        <span class="badge ${item.gender === 'F' ? 'badge-female' : 'badge-male'}">
                            ${item.gender === 'F' ? 'Female' : 'Male'}
                        </span>
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value">${item.followers || 0}</div>
                            <div class="stat-label">Followers</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${item.popularity_rank || 0}</div>
                            <div class="stat-label">Popularity Rank</div>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Show details in modal
    function showDetails(item) {
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modalBody');
        
        const typeLabel = item.talent_type === 'idol' ? 'Idol' : 'Actor';
        
        modalBody.innerHTML = `
            <h2>${item.name}</h2>
            <hr>
            <p><strong>Type:</strong> ${typeLabel}</p>
            <p><strong>Age:</strong> ${item.age}</p>
            <p><strong>Gender:</strong> ${item.gender === 'F' ? 'Female' : 'Male'}</p>
            <p><strong>Debut Date:</strong> ${item.debut_date}</p>
            <p><strong>Agency:</strong> ${item.agency || 'Independent'}</p>
            <p><strong>Status:</strong> ${item.status === 'A' ? 'Active' : 'Inactive'}</p>
            <p><strong>Followers:</strong> ${item.followers || 0}</p>
            <p><strong>Popularity Rank:</strong> ${item.popularity_rank || 0}</p>
            <p><strong>Biography:</strong> ${item.biography || 'No biography available'}</p>
        `;
        
        modal.style.display = 'flex';
        
        document.querySelector('.close').onclick = () => {
            modal.style.display = 'none';
        };
        
        window.onclick = (event) => {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    }

    // Handle form submit
    document.getElementById('addTalentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newItem = {
            name: document.getElementById('name').value,
            age: parseInt(document.getElementById('age').value),
            gender: document.getElementById('gender').value,
            talent_type: currentType,  // 👈 ВАЖНО! Передаём тип
            debut_date: document.getElementById('debutDate').value,
            agency: document.getElementById('agency').value,
            biography: document.getElementById('biography').value,
            status: 'A'
        };

        try {
            const response = await fetch(API_URL, {  // 👈 ОДИН API
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(newItem)
            });

            if (response.ok) {
                alert(`✨ ${currentType === 'idol' ? 'Idol' : 'Actor'} added successfully! ✨`);
                document.getElementById('addTalentForm').reset();
                loadData();
            } else {
                const errorData = await response.json();
                console.error('Error details:', errorData);
                alert('Error adding: ' + JSON.stringify(errorData));
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error adding');
        }
    });

    // Load initial data
    loadData();
</script>
</body>
</html>
